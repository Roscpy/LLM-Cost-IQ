# docker-compose.yml
version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: costiq
      POSTGRES_PASSWORD: costiq123
      POSTGRES_DB: costiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://costiq:costiq123@postgres:5432/costiq
volumes:
  pgdata:
